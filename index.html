<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collage Grab</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app">
<h1>Collage Grab</h1>
<p>Paste a Pinterest URL and download animated collages.</p>

<input type="text" id="url" placeholder="https://www.pinterest.com/...">

<select id="format">
<option value="webm">WebM</option>
<option value="mp4">MP4</option>
<option value="gif">GIF</option>
</select>

<button id="downloadBtn">Download Animation</button>

<div id="status"></div>
</main>

<script src="app.js"></script>
</body>
</html>
